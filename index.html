<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cell Organelle Explorer</title>
<meta name="description" content="Interactive Cell Organelle Explorer — raise your fingers to identify organelles using your camera!">
<meta name="theme-color" content="#060d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Organelle Explorer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060d1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #container { position: relative; width: 100vw; height: 100vh; }
  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; pointer-events: none; }
  canvas#main { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #header { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(6,13,26,0.9), transparent); z-index: 10; }
  #header h1 { color: #fff; font-size: 16px; font-weight: 600; }
  #header h1 span { color: #5cf8ff; }
  #badge { background: rgba(92,248,255,0.12); border: 0.5px solid rgba(92,248,255,0.3); color: #5cf8ff; font-size: 10px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  #loading { position: absolute; inset: 0; background: #060d1a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 30; }
  #playAgainBtn {
    display: none;
    position: absolute;
    top: 170px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, #2ecc71, #1abc9c);
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 13px 42px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(46,204,113,0.55);
    letter-spacing: 0.02em;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #playAgainBtn.show { display: block; }
  #loading p { color: rgba(255,255,255,0.45); font-size: 14px; }
  .spinner { width: 38px; height: 38px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #5cf8ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p id="load-text">Loading AI model…</p></div>
<div id="container">
  <video id="video" playsinline></video>
  <canvas id="main"></canvas>
  <div id="header">
    <h1>🔬 Cell <span>Organelle</span> Explorer</h1>
    <div id="badge">Class 9–12 Bio</div>
  </div>
  <button id="playAgainBtn">🔄&nbsp; Play Again</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ─── ORGANELLE DATA ───────────────────────────────────────────────
const ORGANELLES = [
  { name:'Nucleus',               color:'#4a90d9', glow:'#1a5fb4', fact:'Control center. Contains DNA & directs all cell activities.',         draw:drawNucleus },
  { name:'Mitochondria',          color:'#f5a623', glow:'#e67e22', fact:'Powerhouse of the cell! Produces ATP via cellular respiration.',      draw:drawMitochondria },
  { name:'Ribosome',              color:'#e74c3c', glow:'#c0392b', fact:'Protein factory! Translates mRNA into proteins essential for life.',   draw:drawRibosome },
  { name:'Golgi Apparatus',       color:'#9b59b6', glow:'#6c3483', fact:'Post office of the cell. Modifies, packages & ships proteins.',        draw:drawGolgi },
  { name:'Endoplasmic Reticulum', color:'#1abc9c', glow:'#0e6655', fact:'Transport highway. Rough ER makes proteins, Smooth ER makes lipids.', draw:drawER },
  { name:'Cell Membrane',         color:'#5cf8ff', glow:'#0077aa', fact:'Selectively permeable barrier. Controls what enters & exits the cell.',draw:drawMembrane },
  { name:'Chloroplast',           color:'#2ecc71', glow:'#1a8a45', fact:'Site of photosynthesis. Converts sunlight + CO₂ + H₂O into glucose.', draw:drawChloroplast },
  { name:'Vacuole',               color:'#74b9ff', glow:'#0984e3', fact:'Storage organelle. Plant vacuoles maintain turgor pressure & water.',  draw:drawVacuole },
  { name:'Lysosome',              color:'#fd79a8', glow:'#b2006e', fact:'Suicide bag of the cell. Digests waste using hydrolytic enzymes.',     draw:drawLysosome },
  { name:'Centriole',             color:'#fdcb6e', glow:'#e17055', fact:'Forms spindle fibers during cell division. Found only in animal cells.',draw:drawCentriole },
];

// ─── DRAW FUNCTIONS ───────────────────────────────────────────────
function drawNucleus(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor='#4a90d9';ctx.strokeStyle='#4a90d9';ctx.lineWidth=3*s;ctx.beginPath();ctx.ellipse(x,y,44*s,36*s,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(74,144,217,0.4)';ctx.lineWidth=8*s;ctx.beginPath();ctx.ellipse(x,y,44*s,36*s,0,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(74,144,217,0.18)';ctx.beginPath();ctx.ellipse(x,y,44*s,36*s,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=10;ctx.fillStyle='#4a90d9';ctx.beginPath();ctx.ellipse(x+6*s,y-4*s,14*s,11*s,0.3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;for(let i=0;i<8;i++){const ang=(i/8)*Math.PI*2,px=x+Math.cos(ang)*44*s,py=y+Math.sin(ang)*36*s;ctx.fillStyle='#1a5fb4';ctx.beginPath();ctx.arc(px,py,3.5*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5cf8ff';ctx.beginPath();ctx.arc(px,py,1.5*s,0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawMitochondria(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor='#f5a623';ctx.strokeStyle='#f5a623';ctx.lineWidth=2.5*s;ctx.beginPath();ctx.ellipse(x,y,46*s,26*s,-0.2,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(245,166,35,0.12)';ctx.beginPath();ctx.ellipse(x,y,46*s,26*s,-0.2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(245,166,35,0.75)';ctx.lineWidth=1.5*s;ctx.shadowBlur=8;for(let i=-2;i<=2;i++){const cx=x+i*14*s;ctx.beginPath();ctx.moveTo(cx,y-18*s);ctx.bezierCurveTo(cx+10*s,y-8*s,cx+10*s,y+8*s,cx,y+18*s);ctx.stroke();}ctx.restore();}
function drawRibosome(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=15;ctx.shadowColor='#e74c3c';ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.ellipse(x,y-6*s,26*s,18*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff7675';ctx.beginPath();ctx.ellipse(x+4*s,y+16*s,18*s,12*s,0.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2*s;ctx.shadowBlur=0;ctx.beginPath();ctx.moveTo(x-22*s,y+4*s);ctx.lineTo(x+22*s,y+4*s);ctx.stroke();ctx.strokeStyle='#fdcb6e';ctx.lineWidth=1.5*s;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x-38*s,y+5*s);ctx.lineTo(x+38*s,y+5*s);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
function drawGolgi(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=18;ctx.shadowColor='#9b59b6';const c=['#9b59b6','#a569bd','#b07cc6','#c39bd3','#d7bde2'];for(let i=0;i<5;i++){const ry=y-20*s+i*10*s,rw=(42-i*4)*s;ctx.strokeStyle=c[i];ctx.lineWidth=2.5*s;ctx.fillStyle=`rgba(155,89,182,${0.1-i*0.01})`;ctx.beginPath();ctx.ellipse(x,ry,rw,5*s,0,0,Math.PI*2);ctx.fill();ctx.stroke();}ctx.shadowBlur=10;[[x+50*s,y-18*s,'#9b59b6'],[x+52*s,y-8*s,'#a569bd'],[x-48*s,y-14*s,'#c39bd3']].forEach(([vx,vy,vc])=>{ctx.fillStyle=vc;ctx.beginPath();ctx.arc(vx,vy,7*s,0,Math.PI*2);ctx.fill();});ctx.restore();}
function drawER(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=15;ctx.shadowColor='#1abc9c';ctx.strokeStyle='#1abc9c';ctx.lineWidth=2.5*s;for(let row=-2;row<=2;row++){const ry=y+row*14*s;ctx.beginPath();ctx.moveTo(x-46*s,ry);for(let wx=-46;wx<=46;wx+=12)ctx.bezierCurveTo(x+(wx+3)*s,ry-8*s,x+(wx+9)*s,ry+8*s,x+(wx+12)*s,ry);ctx.stroke();if(row===-2)for(let rx=-40;rx<=40;rx+=16){ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(x+rx*s,ry-6*s,3.5*s,0,Math.PI*2);ctx.fill();}}ctx.restore();}
function drawMembrane(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=18;ctx.shadowColor='#5cf8ff';const R=40*s;for(let l=0;l<2;l++){const r=R+l*10*s;ctx.strokeStyle=l===0?'#5cf8ff':'rgba(92,248,255,0.4)';ctx.lineWidth=l===0?2.5*s:6*s;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='#5cf8ff';ctx.shadowBlur=8;for(let i=0;i<16;i++){const ang=(i/16)*Math.PI*2;[[R-5*s],[R+5*s]].forEach(([r])=>{ctx.beginPath();ctx.arc(x+Math.cos(ang)*r,y+Math.sin(ang)*r,3.5*s,0,Math.PI*2);ctx.fill();});}ctx.fillStyle='rgba(92,248,255,0.5)';ctx.strokeStyle='#5cf8ff';ctx.lineWidth=1.5*s;ctx.beginPath();ctx.ellipse(x,y-R,8*s,14*s,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();}
function drawChloroplast(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor='#2ecc71';ctx.strokeStyle='#2ecc71';ctx.lineWidth=2.5*s;ctx.beginPath();ctx.ellipse(x,y,46*s,28*s,0,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(46,204,113,0.12)';ctx.beginPath();ctx.ellipse(x,y,46*s,28*s,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=8;[[-16,0],[6,-4],[26,3]].forEach(([ox,oy])=>{for(let i=-2;i<=2;i++){ctx.fillStyle=i%2===0?'#27ae60':'#2ecc71';ctx.beginPath();ctx.ellipse(x+ox*s,y+oy*s+i*5*s,12*s,4*s,0,0,Math.PI*2);ctx.fill();}});ctx.restore();}
function drawVacuole(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor='#74b9ff';ctx.fillStyle='rgba(116,185,255,0.15)';ctx.beginPath();ctx.ellipse(x,y,42*s,38*s,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#74b9ff';ctx.lineWidth=2.5*s;ctx.beginPath();ctx.ellipse(x,y,42*s,38*s,0,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=5;ctx.fillStyle='rgba(116,185,255,0.6)';[[-12,-10],[8,-15],[-5,8],[15,5],[-18,5],[2,-2],[18,-8]].forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(x+dx*s,y+dy*s,4*s,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#74b9ff';ctx.font=`bold ${14*s}px sans-serif`;ctx.textAlign='center';ctx.fillText('H₂O',x,y+38*s+18*s);ctx.restore();}
function drawLysosome(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor='#fd79a8';ctx.fillStyle='rgba(253,121,168,0.2)';ctx.beginPath();ctx.arc(x,y,36*s,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fd79a8';ctx.lineWidth=2.5*s;ctx.beginPath();ctx.arc(x,y,36*s,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=8;const enz=['#ff7675','#fd79a8','#e84393','#ff5e57'];[[-10,-10],[10,-8],[-15,8],[8,12],[0,-2],[16,-1],[-4,16]].forEach(([dx,dy],i)=>{ctx.fillStyle=enz[i%enz.length];ctx.beginPath();ctx.arc(x+dx*s,y+dy*s,5*s,0,Math.PI*2);ctx.fill();});ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font=`bold ${11*s}px sans-serif`;ctx.textAlign='center';ctx.fillText('pH 4.8',x,y+38*s+16*s);ctx.restore();}
function drawCentriole(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=18;ctx.shadowColor='#fdcb6e';const d9=(cx,cy,r,angle)=>{for(let i=0;i<9;i++){const ang=angle+(i/9)*Math.PI*2,bx=cx+Math.cos(ang)*r,by=cy+Math.sin(ang)*r;ctx.fillStyle='#fdcb6e';ctx.beginPath();ctx.arc(bx,by,3.5*s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e17055';ctx.beginPath();ctx.arc(bx+1.5*s*Math.cos(ang+0.4),by+1.5*s*Math.sin(ang+0.4),2*s,0,Math.PI*2);ctx.fill();}ctx.strokeStyle='rgba(253,203,110,0.3)';ctx.lineWidth=1*s;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();};d9(x-14*s,y,18*s,0);ctx.save();ctx.translate(x+14*s,y);ctx.rotate(Math.PI/2);d9(0,0,18*s,Math.PI/18);ctx.restore();ctx.restore();}

// ─── CORE SETUP ───────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('main');
const ctx       = canvas.getContext('2d');
const loadingEl = document.getElementById('loading');
const loadText  = document.getElementById('load-text');

let lastResults  = null;
let floatOffsets = Array.from({length:10}, () => ({ t:Math.random()*Math.PI*2, speed:0.025+Math.random()*0.02 }));

const FINGERTIP_IDS  = [4, 8, 12, 16, 20];
const FINGER_BASE_IDS = [3, 5, 9, 13, 17];

function isFingerUp(lms, tip, base) { return lms[tip].y < lms[base].y; }

// ─── CRISP CANVAS (Device Pixel Ratio fix) ────────────────────────
// Without this, canvas text looks blurry on high-density mobile screens.
let dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // scale once; all drawing uses CSS px
}
resize();
window.addEventListener('resize', resize);

let time = 0;

// ─── QUIZ STATE ───────────────────────────────────────────────────
let quizQueue = [], quizIndex = 0, quizAnswered = false;
let quizShowCorrect = false, quizCorrectTimer = 0, quizCompleted = false;
let quizAnim = 0;
let touchFrameCount = 0;
const TOUCH_FRAMES_NEEDED = 3;

function initQuiz() {
  quizQueue = Array.from({length:10},(_,i)=>i);
  for (let i=quizQueue.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [quizQueue[i],quizQueue[j]]=[quizQueue[j],quizQueue[i]];
  }
  quizIndex=0; quizAnswered=false; quizShowCorrect=false;
  quizCorrectTimer=0; quizCompleted=false; touchFrameCount=0;
}

// ─── DETECTION: no hand-label dependency, no cache ────────────────
// Strategy:
//   1. The correct finger (fi) must be raised on ANY detected hand.
//   2. The hand it's on must be on the correct side of the screen
//      (right half for oi<5, left half for oi>=5) — uses wrist X position.
//   3. ANY landmark of ANY OTHER detected hand must be within threshold
//      of that fingertip (= "holding" gesture).
//   4. If hands merge into 1 (overlap), require 2+ non-adjacent landmarks
//      of that merged detection near the tip.
// This avoids ALL reliance on MediaPipe's handedness label, which
// flips inconsistently across devices and MediaPipe versions.

function checkQuizAnswer(hands, handedness) {
  if (hands.length < 2) return false;

  const oi     = quizQueue[quizIndex];
  const fi     = oi % 5;
  const tipId  = FINGERTIP_IDS[fi];
  const baseId = FINGER_BASE_IDS[fi];
  const W      = window.innerWidth;
  const H      = window.innerHeight;

  const targetOnRight = oi < 5;

  // ── Find the target hand ─────────────────────────────────────────
  let tHand = -1;
  for (let i = 0; i < hands.length; i++) {
    const lms = hands[i];
    if (!isFingerUp(lms, tipId, baseId)) continue;
    const wristX = (1 - lms[0].x) * W;
    if (targetOnRight && wristX > W * 0.40) { tHand = i; break; }
    if (!targetOnRight && wristX < W * 0.60) { tHand = i; break; }
  }
  if (tHand === -1) {
    for (let i = 0; i < hands.length; i++) {
      if (isFingerUp(hands[i], tipId, baseId)) { tHand = i; break; }
    }
  }
  if (tHand === -1) return false;

  const tLms = hands[tHand];
  const tx   = (1 - tLms[tipId].x) * W;
  const ty   = tLms[tipId].y * H;

  // Threshold for correct finger contact — generous (11%)
  const thr = Math.min(W, H) * 0.11;

  // Landmarks to probe on the other hand for CORRECT finger detection
  // (generous — fingertips + palm + knuckles, all points that contact a held finger)
  const PROBE = [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 12, 13, 14, 16, 17, 18, 20];

  // ── Find the other hand ──────────────────────────────────────────
  let oHand = -1;
  for (let i = 0; i < hands.length; i++) {
    if (i !== tHand) { oHand = i; break; }
  }
  if (oHand === -1) return false;

  // ── Step 1: Other hand must be touching the CORRECT fingertip ─────
  const touching = PROBE.some(id => {
    const lm = hands[oHand][id];
    if (!lm) return false;
    return Math.hypot((1 - lm.x) * W - tx, lm.y * H - ty) < thr;
  });
  if (!touching) return false;

  // ── Step 2: CRITICAL: Reject only if another fingertip of the other hand
  //    is deliberately near a WRONG fingertip of the target hand.
  //    - wrongThr = 8%: tight enough to reject deliberate gripping of
  //      a wrong finger, but loose enough that natural skin grazing of
  //      an adjacent finger doesn't disqualify.
  //    - Only check FINGERTIPS of the other hand (not palm/knuckles)
  //      because palm contact near an adjacent fingertip is unavoidable
  //      when holding any finger — fingertip-to-fingertip is deliberate.
  const wrongThr = Math.min(W, H) * 0.08;
  const WRONG_TIPS = FINGERTIP_IDS.filter(id => id !== tipId);
  for (const wrongTipId of WRONG_TIPS) {
    const wx = (1 - tLms[wrongTipId].x) * W;
    const wy = tLms[wrongTipId].y * H;
    const deliberateWrongHold = FINGERTIP_IDS.some(id => {
      const lm = hands[oHand][id];
      if (!lm) return false;
      return Math.hypot((1 - lm.x) * W - wx, lm.y * H - wy) < wrongThr;
    });
    if (deliberateWrongHold) return false;
  }

  return true; // touching ONLY the correct finger ✅
}

// Wrap text helper — returns last Y used
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words=text.split(' '); let line='', ly=y;
  for (const w of words) {
    const t=line+w+' ';
    if (ctx.measureText(t).width>maxW && line!=='') { ctx.fillText(line.trim(),x,ly); line=w+' '; ly+=lineH; }
    else line=t;
  }
  if (line.trim()) ctx.fillText(line.trim(),x,ly);
  return ly;
}

// ─── QUIZ PANEL ───────────────────────────────────────────────────
function drawQuizPanel(ctx, W, H) {
  quizAnim += 0.016;
  const pad    = 14;
  const panelW = Math.min(440, W - pad*2);   // fits mobile screens
  const panelX = W/2 - panelW/2;
  const panelY = 48;
  const R      = 13;

  // ── COMPLETION ────────────────────────────────────────────────
  if (quizCompleted) {
    const panH = 80;
    ctx.save();
    ctx.fillStyle='rgba(6,13,26,0.93)'; ctx.strokeStyle='#2ecc71'; ctx.lineWidth=1.8;
    ctx.shadowBlur=22; ctx.shadowColor='#2ecc71';
    roundRect(ctx,panelX,panelY,panelW,panH,R); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='#2ecc71'; ctx.font=`700 14px 'Segoe UI',sans-serif`;
    ctx.fillText('🎉  Brilliant! All 10 organelles identified!',W/2,panelY+28);
    ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.font=`500 11px 'Segoe UI',sans-serif`;
    ctx.fillText("You're a Cell Biology expert!",W/2,panelY+50);
    ctx.restore();
    document.getElementById('playAgainBtn').classList.add('show');
    // Position button just below the completion panel
    const btn = document.getElementById('playAgainBtn');
    btn.style.top = (panelY + panH + 16) + 'px';
    return;
  }
  document.getElementById('playAgainBtn').classList.remove('show');

  const org       = ORGANELLES[quizQueue[quizIndex]];
  const oi        = quizQueue[quizIndex];
  const handName  = oi < 5 ? 'right' : 'left';
  const handEmoji = oi < 5 ? '🤚' : '🖐️';
  const correct   = quizShowCorrect;

  // Dynamically size panel height based on clue text
  ctx.font = `500 12px 'Segoe UI',sans-serif`;
  const clueW = panelW - 40;
  let lines=1, tmp='';
  for (const w of org.fact.split(' ')) {
    const t=tmp+w+' ';
    if (ctx.measureText(t).width>clueW&&tmp!=='') { lines++; tmp=w+' '; } else tmp=t;
  }
  const panH = correct ? 76 : Math.min(38 + lines*16 + 38, 110);

  ctx.save();

  // Shadow glow
  ctx.shadowBlur  = correct ? 26 : 13;
  ctx.shadowColor = correct ? '#2ecc71' : 'rgba(92,248,255,0.5)';

  // Fill
  ctx.fillStyle = 'rgba(6,13,26,0.92)';
  roundRect(ctx,panelX,panelY,panelW,panH,R); ctx.fill();

  // Border
  ctx.shadowBlur=0;
  ctx.strokeStyle = correct ? '#2ecc71' : 'rgba(92,248,255,0.4)';
  ctx.lineWidth   = correct ? 1.8 : 1.1;
  roundRect(ctx,panelX,panelY,panelW,panH,R); ctx.stroke();

  // Bubble tail ▾
  const tx=W/2, ty=panelY+panH;
  ctx.fillStyle   = 'rgba(6,13,26,0.92)';
  ctx.strokeStyle = correct ? '#2ecc71' : 'rgba(92,248,255,0.4)';
  ctx.lineWidth   = correct ? 1.8 : 1.1;
  ctx.beginPath(); ctx.moveTo(tx-9,ty); ctx.lineTo(tx,ty+10); ctx.lineTo(tx+9,ty);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  if (correct) {
    // ── CORRECT ──────────────────────────────────────────────────
    ctx.fillStyle='#2ecc71'; ctx.font=`700 14px 'Segoe UI',sans-serif`;
    ctx.shadowBlur=8; ctx.shadowColor='#2ecc71';
    ctx.fillText(`✅  Correct! It's the ${org.name}!`,W/2,panelY+26);
    ctx.shadowBlur=0;
    // progress bar
    const bx=panelX+16, by=panelY+panH-14, bW=panelW-32, bH=5;
    ctx.fillStyle='rgba(255,255,255,0.08)'; roundRect(ctx,bx,by,bW,bH,3); ctx.fill();
    ctx.fillStyle='#2ecc71'; roundRect(ctx,bx,by,bW*((quizIndex+1)/quizQueue.length),bH,3); ctx.fill();
    ctx.fillStyle='rgba(46,204,113,0.55)'; ctx.font=`500 10px 'Segoe UI',sans-serif`;
    ctx.fillText(`${quizIndex+1} of ${quizQueue.length} complete`,W/2,panelY+46);
    // "Next question…" fades in during the last 0.7 s of the pause
    if (quizCorrectTimer < 0.35 && quizIndex+1 < quizQueue.length) {
      const fadeAlpha = Math.min(1, (0.35-quizCorrectTimer)/0.25);
      ctx.fillStyle=`rgba(92,248,255,${fadeAlpha*0.8})`;
      ctx.font=`600 11px 'Segoe UI',sans-serif`;
      ctx.fillText('Next question coming up… ➜', W/2, panelY+62);
    }

  } else {
    // ── QUESTION ─────────────────────────────────────────────────
    const pulse=0.7+0.3*Math.sin(quizAnim*3);
    ctx.fillStyle=`rgba(92,248,255,${pulse})`; ctx.font=`700 11px 'Segoe UI',sans-serif`;
    ctx.fillText('🔍  GUESS THE ORGANELLE',panelX+panelW*0.37,panelY+17);

    // Counter pill
    const cnt=`${quizIndex+1}/${quizQueue.length}`;
    ctx.font=`600 10px 'Segoe UI',sans-serif`;
    const cW=ctx.measureText(cnt).width+14;
    ctx.fillStyle='rgba(92,248,255,0.13)';
    roundRect(ctx,panelX+panelW-cW-10,panelY+5,cW,17,8); ctx.fill();
    ctx.strokeStyle='rgba(92,248,255,0.28)'; ctx.lineWidth=0.7;
    roundRect(ctx,panelX+panelW-cW-10,panelY+5,cW,17,8); ctx.stroke();
    ctx.fillStyle='#5cf8ff'; ctx.fillText(cnt,panelX+panelW-cW/2-10,panelY+17);

    // Divider
    ctx.strokeStyle='rgba(92,248,255,0.16)'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(panelX+14,panelY+23); ctx.lineTo(panelX+panelW-14,panelY+23); ctx.stroke();

    // Clue text
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`800 12px 'Segoe UI',sans-serif`;
    wrapText(ctx,`💬 "${org.fact}"`,W/2,panelY+38,clueW,16);

    // Short hand hint — concise enough for narrow mobile screens
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`600 12px 'Segoe UI',sans-serif`;
    ctx.fillText(`${handEmoji} ${handName} hand · raise fingers to find it · hold with other hand`,
                  W/2, panelY+panH-13);

    // Progress dots
    const gap=13, total=quizQueue.length, startX=W/2-(total-1)*gap/2;
    for (let d=0;d<total;d++) {
      const dx=startX+d*gap, dy=panelY+panH-4;
      if (d<quizIndex) { ctx.fillStyle='#2ecc71'; ctx.beginPath(); ctx.arc(dx,dy,2.5,0,Math.PI*2); ctx.fill(); }
      else if (d===quizIndex) {
        const r=3.5+Math.sin(quizAnim*4)*0.7;
        ctx.fillStyle='#5cf8ff'; ctx.shadowBlur=7; ctx.shadowColor='#5cf8ff';
        ctx.beginPath(); ctx.arc(dx,dy,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      } else { ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.beginPath(); ctx.arc(dx,dy,2.5,0,Math.PI*2); ctx.fill(); }
    }
  }
  ctx.restore();
}

// ─── COPYRIGHT ────────────────────────────────────────────────────
function drawCopyright(ctx, W, H) {
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font=`400 11px 'Segoe UI',sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('© Created by Soumen Kundu', W/2, H-10);
  ctx.restore();
}

// ─── RENDER LOOP ──────────────────────────────────────────────────
function render() {
  // Always use logical CSS pixels — the DPR transform handles the rest
  const W = window.innerWidth, H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  if (video.readyState >= 2) {
    ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
    ctx.drawImage(video,0,0,W,H); ctx.restore();
  } else {
    ctx.fillStyle='#060d1a'; ctx.fillRect(0,0,W,H);
  }

  ctx.fillStyle='rgba(6,13,26,0.45)'; ctx.fillRect(0,0,W,H);
  time+=0.016;

  if (lastResults?.multiHandLandmarks) {
    const hands=lastResults.multiHandLandmarks, handedness=lastResults.multiHandedness;
    hands.forEach((lms,hi)=>{
      const label=handedness[hi]?.label, hOff=label==='Left'?0:5;
      FINGERTIP_IDS.forEach((tipId,fi)=>{
        const baseId=FINGER_BASE_IDS[fi];
        if (!isFingerUp(lms,tipId,baseId)) return;
        const oi=hOff+fi, org=ORGANELLES[oi], fo=floatOffsets[oi];
        fo.t+=fo.speed;
        const sx=(1-lms[tipId].x)*W, sy=lms[tipId].y*H;
        const ox=sx, oy=sy-75+Math.sin(fo.t)*8;
        const scale=Math.min(W,H)/500;

        // glow ring
        ctx.save(); ctx.shadowBlur=25; ctx.shadowColor=org.glow;
        ctx.strokeStyle=org.color; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.fill();
        ctx.restore();

        // connector
        ctx.save(); ctx.strokeStyle=`rgba(${hexRgb(org.color)},0.4)`;
        ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(sx,sy-14); ctx.lineTo(ox,oy+55*scale); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();

        // illustration
        org.draw(ctx,ox,oy,scale,1);

        // name badge
        ctx.save(); ctx.shadowBlur=20; ctx.shadowColor=org.glow;
        ctx.font=`600 12px 'Segoe UI',sans-serif`;
        const tw=ctx.measureText(org.name).width+24, bh=24, bx=ox-tw/2, by=oy+62*scale;
        ctx.fillStyle='rgba(6,13,26,0.85)'; roundRect(ctx,bx,by,tw,bh,12); ctx.fill();
        ctx.strokeStyle=org.color; ctx.lineWidth=1.2; roundRect(ctx,bx,by,tw,bh,12); ctx.stroke();
        ctx.fillStyle=org.color; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(org.name,ox,by+bh/2); ctx.restore();
      });
    });

    // quiz check — must detect touch in TOUCH_FRAMES_NEEDED consecutive frames
    if (!quizAnswered && !quizCompleted) {
      if (checkQuizAnswer(hands, handedness)) {
        touchFrameCount++;
        if (touchFrameCount >= TOUCH_FRAMES_NEEDED) {
          quizAnswered=true; quizShowCorrect=true; quizCorrectTimer=1.0;
          touchFrameCount=0;
          // Play correct answer chime
          if (quizIndex + 1 >= quizQueue.length) {
            playFanfare();   // last question — celebration sound
          } else {
            playChime();     // regular correct answer chime
          }
        }
      } else {
        touchFrameCount=0;
      }
    }
  } else {
    touchFrameCount=0; // reset when hands disappear
  }

  // quiz timer
  if (quizShowCorrect&&!quizCompleted) {
    quizCorrectTimer-=0.016;
    if (quizCorrectTimer<=0) {
      quizShowCorrect=false; quizAnswered=false; quizIndex++;
      if (quizIndex>=quizQueue.length) quizCompleted=true;
    }
  }

  drawQuizPanel(ctx,W,H);
  drawCopyright(ctx,W,H);
  requestAnimationFrame(render);
}

// ─── UTILS ────────────────────────────────────────────────────────
function hexRgb(hex){return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ─── SOUNDS (Web Audio API — no files needed) ─────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, startTime, duration, volume, type, ac) {
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playChime() {
  try {
    const ac = getAudio();
    const t  = ac.currentTime;
    // Pleasant ascending three-note chime: C5 → E5 → G5
    playTone(523.25, t,        0.18, 0.35, 'sine', ac);
    playTone(659.25, t + 0.12, 0.18, 0.30, 'sine', ac);
    playTone(783.99, t + 0.24, 0.30, 0.25, 'sine', ac);
  } catch(e) {}
}

function playFanfare() {
  try {
    const ac = getAudio();
    const t  = ac.currentTime;
    // Celebratory ascending fanfare: C5→E5→G5→C6
    playTone(523.25, t,        0.15, 0.35, 'sine', ac);
    playTone(659.25, t + 0.10, 0.15, 0.32, 'sine', ac);
    playTone(783.99, t + 0.20, 0.15, 0.30, 'sine', ac);
    playTone(1046.5, t + 0.30, 0.45, 0.28, 'sine', ac);
    // harmony note
    playTone(783.99, t + 0.30, 0.45, 0.15, 'sine', ac);
  } catch(e) {}
}

// ─── INIT ─────────────────────────────────────────────────────────
async function init() {
  loadText.textContent='Requesting camera access…';
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720},audio:false});
  video.srcObject=stream; await video.play();
  // Pre-unlock AudioContext as early as possible
  try { getAudio(); } catch(e) {}

  loadText.textContent='Loading MediaPipe AI…';
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
  hands.onResults(r=>{lastResults=r;});

  loadText.textContent='Starting tracker…';
  const cam=new Camera(video,{onFrame:async()=>await hands.send({image:video}),width:1280,height:720});
  await cam.start();

  loadingEl.style.transition='opacity 0.5s'; loadingEl.style.opacity='0';
  setTimeout(()=>loadingEl.style.display='none',500);
  initQuiz();

  document.getElementById('playAgainBtn').addEventListener('click', () => {
    // Unlock audio context on user interaction if not already done
    try { getAudio().resume(); } catch(e) {}
    initQuiz();
  });

  render();
}

init().catch(err=>{
  loadingEl.innerHTML=`
    <p style="color:#ff5c5c;font-size:15px;margin-bottom:8px;">⚠️ ${err.message}</p>
    <p style="color:rgba(255,255,255,0.4);font-size:13px;">Allow camera permission & open in Chrome/Edge.</p>`;
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
